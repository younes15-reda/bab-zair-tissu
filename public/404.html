  <!-- Redirection SPA : technique GitHub Pages standard -->
  <!-- Encode l'URL complète (chemin + query params) et redirige vers index.html -->
  <script>
    (function() {
      // Récupérer toute l'URL actuelle
      var location = window.location;
      // Construire l'URL de redirection vers la racine avec l'URL encodée en paramètre
      var basePath = '/bab-zair-tissu';
      var redirectUrl = location.protocol + '//' + location.hostname +
        basePath + '/?p=' + encodeURIComponent(
          location.pathname.slice(basePath.length) +
          (location.search ? location.search : '') +
          (location.hash ? location.hash : '')
        );
      // Redirection immédiate (remplace l'historique pour ne pas créer d'entrée 404)
      window.location.replace(redirectUrl);
    })();
  </script>
